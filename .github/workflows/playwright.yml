name: Playwright Tests

on:
  workflow_dispatch:  # 👈 添加这个以便手动触发测试
  schedule:
    # Run every day at 14:05 UTC
    - cron: "05 14 * * *"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      # 👇 预加载 upload-artifact，防止 metadata 问题
      - name: Preload upload-artifact (GitHub bug workaround)
        uses: actions/upload-artifact@v4
        if: false
        with:
          name: preload
          path: dummy
          retention-days: 1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          FIRST_NAME: ${{ secrets.FIRST_NAME }}
          LAST_NAME: ${{ secrets.LAST_NAME }}
          NUMBER_OF_TICKETS: ${{ secrets.NUMBER_OF_TICKETS }}
          EMAIL: ${{ secrets.EMAIL }}
          DOB_MONTH: ${{ secrets.DOB_MONTH }}
          DOB_DAY: ${{ secrets.DOB_DAY }}
          DOB_YEAR: ${{ secrets.DOB_YEAR }}
          ZIP: ${{ secrets.ZIP }}
          COUNTRY: ${{ secrets.COUNTRY }}
        run: xvfb-run npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4  # 👈 使用 v4 更稳定
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
